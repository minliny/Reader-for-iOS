name: ReaderForIOS
options:
  bundleIdPrefix: com.reader
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  ReaderCore:
    # Reader-Core's Package.swift lives at the repo root (../Reader-Core/Package.swift),
    # not under ../Reader-Core/Core (that subdir only holds a .build cache).
    path: ../Reader-Core
    from: "0.1.0"

targets:
  ReaderAppPersistence:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: iOS/App/Persistence
    dependencies:
      - target: ReaderAppSupport
      - package: ReaderCore
        product: ReaderCoreModels
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  ReaderAppSupport:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: iOS/AppSupport/Sources
    dependencies:
      - package: ReaderCore
        product: ReaderCoreModels
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  ReaderShellValidation:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: iOS/CoreIntegration
      - path: iOS/CoreBridge
      - path: iOS/Shell
    dependencies:
      - target: ReaderAppSupport
      - package: ReaderCore
        product: ReaderCoreFoundation
      - package: ReaderCore
        product: ReaderCoreModels
      - package: ReaderCore
        product: ReaderCoreProtocols
      - package: ReaderCore
        product: ReaderCoreParser
      - package: ReaderCore
        product: ReaderCoreNetwork
      - package: ReaderCore
        product: ReaderCoreServices
      - package: ReaderCore
        product: ReaderPlatformAdapters
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  ReaderCoreNativeAdapter:
    type: framework
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: iOS/ReaderCoreNativeAdapter
        excludes:
          - cabi/**
          - ShellSmokeTests/**
          - README.md
          - STATUS.md
          - fetch-cabi.sh
          - run-shell-smoke.sh
          - run-sim-smoke.sh
          - sim-smoke-report.txt
    dependencies:
      - framework: iOS/ReaderCoreNativeAdapter/cabi/ReaderCore.xcframework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  ReaderForIOSApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: iOS/App
      - path: iOS/Features
      - path: iOS/Navigation
      - path: iOS/Modules
      - path: iOS/Surface
      - path: iOS/AppSupport
    dependencies:
      - target: ReaderShellValidation
      - target: ReaderAppSupport
      - target: ReaderAppPersistence
      - target: ReaderCoreNativeAdapter
      - package: ReaderCore
        product: ReaderCoreModels
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reader.ios
        INFOPLIST_FILE: iOS/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_BITCODE: NO
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: Reader
        CFBundleName: ReaderForIOS
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            www.qianfanxs.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSIncludesSubdomains: true

  ShellSmokeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: iOS/Tests/ShellSmokeTests
    dependencies:
      - target: ReaderShellValidation
      - target: ReaderAppSupport
      - package: ReaderCore
        product: ReaderCoreModels
      - package: ReaderCore
        product: ReaderCoreProtocols
      - package: ReaderCore
        product: ReaderCoreParser
      - package: ReaderCore
        product: ReaderCoreNetwork
      - package: ReaderCore
        product: ReaderCoreServices
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  ReaderAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: iOS/Tests/ReaderAppTests
    dependencies:
      - target: ReaderForIOSApp
      - target: ReaderShellValidation
      - target: ReaderAppSupport
      - target: ReaderAppPersistence
      - package: ReaderCore
        product: ReaderCoreModels
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ReaderForIOSApp:
    build:
      targets:
        ReaderForIOSApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ShellSmokeTests
    archive:
      config: Release
