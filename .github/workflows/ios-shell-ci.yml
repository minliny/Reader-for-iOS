name: iOS Shell CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ios-shell-ci.yml"
      - "iOS/**"
      - "scripts/check_ios_boundary.sh"
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/ios-shell-ci.yml"
      - "iOS/**"
      - "scripts/check_ios_boundary.sh"

jobs:
  ios-shell-ci:
    name: Boundary + Shell compile smoke
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout Reader-iOS repository
        uses: actions/checkout@v4

      - name: Checkout Reader-Core (sibling to iOS/, for local path dependency)
        shell: bash
        run: |
          git clone --depth 1 https://github.com/minliny/Reader-Core.git Reader-Core

      - name: Protect iOS Shell boundary
        shell: bash
        run: |
          chmod +x scripts/check_ios_boundary.sh
          ./scripts/check_ios_boundary.sh

      - name: Show Swift toolchain
        run: swift --version

      - name: Compile ReaderAppSupport
        shell: bash
        run: |
          set -euo pipefail
          swift build --package-path iOS --target ReaderAppSupport 2>&1

      - name: Compile ReaderIOSPlatformAdapters
        shell: bash
        run: |
          set -euo pipefail
          swift build --package-path iOS --target ReaderIOSPlatformAdapters 2>&1

      - name: Compile ReaderShellValidation
        shell: bash
        run: |
          set -euo pipefail
          swift build --package-path iOS --target ReaderShellValidation 2>&1

      - name: Run PlatformAdapterTests
        shell: bash
        run: |
          set -euo pipefail
          swift test --package-path iOS --filter PlatformAdapterTests 2>&1

      - name: Run LinuxValidationTests
        shell: bash
        run: |
          set -euo pipefail
          swift test --package-path iOS --filter LinuxValidationTests 2>&1

      - name: Run ShellSmokeTests
        shell: bash
        run: |
          set -euo pipefail
          swift test --package-path iOS --filter ShellSmokeTests 2>&1

      - name: Run ShellSmokeTests (PublicSurfaceFunctional)
        shell: bash
        run: |
          set -euo pipefail
          swift test --package-path iOS --filter PublicSurfaceFunctionalSmokeTests 2>&1

      - name: Run ShellSmokeTests (ReaderAppSupportSkeleton)
        shell: bash
        run: |
          set -euo pipefail
          swift test --package-path iOS --filter ReaderAppSupportSkeletonTests 2>&1

      - name: Diagnose ReaderApp target (SwiftUI, diagnostic only)
        shell: bash
        run: |
          set +e
          swift build --package-path iOS --target ReaderApp 2>&1
          echo "=== ReaderApp compile diagnostic (SwiftUI-only, expected to fail on non-Apple platforms) ==="
