name: iOS Shell CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ios-shell-ci.yml"
      - "iOS/**"
      - "scripts/check_ios_boundary.sh"
      - "docs/ios_shell_ci_gate.yml"
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/ios-shell-ci.yml"
      - "iOS/**"
      - "scripts/check_ios_boundary.sh"

jobs:
  ios-shell-ci:
    name: Boundary + Shell compile smoke
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Protect iOS Shell boundary
        shell: bash
        run: |
          chmod +x scripts/check_ios_boundary.sh
          ./scripts/check_ios_boundary.sh

      - name: Show Swift toolchain
        run: swift --version

      - name: Compile iOS Shell composition root
        shell: bash
        run: |
          set -euo pipefail
          # Interim compile gate validates only the host-compilable shell composition root.
          # iOS-only Features/UI stay outside this macOS-hosted SwiftPM validation scope.
          swift build --package-path iOS --target ReaderShellValidation 2>&1 | tee ios-shell-build.log

      - name: Run shell smoke validation
        shell: bash
        run: |
          set -euo pipefail
          # Construction-only smoke stays bound to the isolated shell validation test product.
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ShellAssemblySmokeTests 2>&1 | tee ios-shell-smoke.log

      - name: Run reader functional validation
        shell: bash
        run: |
          set -euo pipefail
          # Functional validation reuses fixture-backed sources without widening the ReaderShellValidation compile target.
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ReaderFlowFunctionalValidationTests 2>&1 | tee ios-reader-functional.log

      - name: Run reader hardening validation
        shell: bash
        run: |
          set -euo pipefail
          # Hardening validation stays on the same isolated test product and only checks state-transition consistency.
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ReaderFlowHardeningTests 2>&1 | tee ios-reader-hardening.log

      - name: Upload iOS Shell logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-shell-ci-logs
          if-no-files-found: error
          path: |
            ios-shell-build.log
            ios-shell-smoke.log
            ios-reader-functional.log
            ios-reader-hardening.log
