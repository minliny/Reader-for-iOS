name: iOS Shell CI
# Core Asset Migration patch (2026-04-15):
# Reader-iOS is now independent. Reader-Core dependency resolved via:
#   iOS/Package.swift: .package(path: "../Reader-Core")
# In CI the Reader-Core repo is checked out as a sibling directory.
# Canonical remote: https://github.com/minliny/Reader-Core.git exact:0.1.0

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ios-shell-ci.yml"
      - "iOS/**"
      - "scripts/check_ios_boundary.sh"
      - "docs/ios_shell_ci_gate.yml"
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/ios-shell-ci.yml"
      - "iOS/**"
      - "scripts/check_ios_boundary.sh"

jobs:
  ios-shell-ci:
    name: Boundary + Shell compile smoke
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout Reader-iOS repository
        uses: actions/checkout@v4

      - name: Checkout Reader-Core (sibling to iOS/, for local path dependency)
        shell: bash
        run: |
          # iOS/Package.swift: .package(path: "../Reader-Core")
          # Path is relative to the iOS/ directory, so Reader-Core must land at
          # <workspace>/Reader-Core (sibling of iOS/ within the checkout).
          # actions/checkout@v4 forbids paths outside $GITHUB_WORKSPACE, so we
          # use git clone which writes to the path relative to $GITHUB_WORKSPACE.
          git clone --depth 1 https://github.com/minliny/Reader-Core.git Reader-Core

      - name: Protect iOS Shell boundary
        shell: bash
        run: |
          chmod +x scripts/check_ios_boundary.sh
          ./scripts/check_ios_boundary.sh

      - name: Show Swift toolchain
        run: swift --version

      - name: Compile iOS Shell composition root
        shell: bash
        run: |
          set -euo pipefail
          # Interim compile gate validates only the host-compilable shell composition root.
          # iOS-only Features/UI stay outside this macOS-hosted SwiftPM validation scope.
          swift build --package-path iOS --target ReaderShellValidation 2>&1 | tee ios-shell-build.log

      - name: Run shell smoke validation
        shell: bash
        run: |
          set -euo pipefail
          # Construction-only smoke stays bound to the isolated shell validation test product.
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ShellAssemblySmokeTests 2>&1 | tee ios-shell-smoke.log

      - name: Run reader functional validation
        shell: bash
        run: |
          set -euo pipefail
          # Functional validation reuses fixture-backed sources without widening the ReaderShellValidation compile target.
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ReaderFlowFunctionalValidationTests 2>&1 | tee ios-reader-functional.log

      - name: Run reader hardening validation
        shell: bash
        run: |
          set -euo pipefail
          # Hardening validation stays on the same isolated test product and only checks state-transition consistency.
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ReaderFlowHardeningTests 2>&1 | tee ios-reader-hardening.log

      - name: Run reader UX foundation validation
        shell: bash
        run: |
          set -euo pipefail
          # UX foundation validation is additive and only checks state-driven presentation surfaces on the minimal reader path.
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ReaderUXFoundationStateTests 2>&1 | tee ios-reader-ux-foundation.log

      - name: Run reader interaction foundation validation
        shell: bash
        run: |
          set -euo pipefail
          # Interaction validation tests minimal interactions like retry and reload without full UI automation.
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ReaderInteractionValidationTests 2>&1 | tee ios-reader-interaction-foundation.log

      - name: Run reader session polish validation
        shell: bash
        run: |
          set -euo pipefail
          # Session polish validation tests session continuity and minimal resume affordances.
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ReaderSessionValidationTests 2>&1 | tee ios-reader-session-polish.log

      - name: Run reader navigation and progress foundation validation
        shell: bash
        run: |
          set -euo pipefail
          # Navigation validation tests chapter position awareness and progress features
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ReaderNavigationValidationTests 2>&1 | tee ios-reader-navigation-foundation.log

      - name: Run reader presentation polish validation
        shell: bash
        run: |
          set -euo pipefail
          # Presentation validation tests consistency of surfaces across the reader feature
          swift test --package-path iOS --test-product ReaderAppPackageTests --filter ReaderPresentationValidationTests 2>&1 | tee ios-reader-presentation-polish.log

      - name: Upload iOS Shell logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-shell-ci-logs
          if-no-files-found: error
          path: |
            ios-shell-build.log
            ios-shell-smoke.log
            ios-reader-functional.log
            ios-reader-hardening.log
            ios-reader-ux-foundation.log
            ios-reader-interaction-foundation.log
            ios-reader-session-polish.log
            ios-reader-navigation-foundation.log
            ios-reader-presentation-polish.log
