name: Sample-001 NonJS Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - claude/fervent-goldstine
    paths:
      - ".github/workflows/sample001-nonjs-smoke.yml"
      - "Core/Package.swift"
      - "Core/Sources/**"
      - "tools/smoke/**"
      - "samples/**"

jobs:
  smoke:
    name: smoke sample_001 nonjs
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        working-directory: Core
        run: swift build --product Sample001NonJSSmokeRunner

      - name: Run smoke
        run: swift run --package-path Core Sample001NonJSSmokeRunner -- "$GITHUB_WORKSPACE"

      - name: Print report
        run: cat samples/reports/latest/sample_001_nonjs_smoke_result.yml

      - name: Commit real report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add samples/reports/latest/sample_001_nonjs_smoke_result.yml
          if git diff --cached --quiet; then
            echo "report unchanged"
          else
            git commit -m "ci: sample_001 nonjs smoke real report"
            git push
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sample001-nonjs-smoke-report
          path: samples/reports/latest/sample_001_nonjs_smoke_result.yml
