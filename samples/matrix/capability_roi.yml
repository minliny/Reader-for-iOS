note: >
  ROI is computed per capability based on:
    impact_samples_count  – number of currently-failing samples that would improve
    level_improvement     – the expected actualLevel delta (D→C, C→B, C→A, D→A)
    implementation_complexity – engineering effort, risk, and scope:
        LOW     – extend existing file, <200 LOC, no new module
        MEDIUM  – new Swift file in existing module, defined protocol boundary
        HIGH    – cross-module changes, partial browser simulation, or real network inside JSContext
        EXTREME – requires full browser engine (WKWebView), TLS fingerprint bypass, or anti-bot JS
  ROI score is qualitative: HIGH / MEDIUM / LOW / NEGATIVE

