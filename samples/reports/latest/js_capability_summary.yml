# Classification key (not a new failureType taxonomy):
#   executable      – JSRuntimeDOMBridge ran; DOM mutated; result available.
#                     Remaining blockers (if any) are outside JS capability.
#   network_blocked – JSContext ran but AJAX / fetch / XHR needed for content.
#                     networkLockdownScript prevents these calls by design.
#   antibot_blocked – JS challenge (Cloudflare BIC / fingerprint) requires live
#                     network from within JS. Same networkLockdownScript barrier.
#   not_required    – requiresJs=false; no JS interaction observed or needed.
#
# Relation to failureType: jsCapability is an explanatory sub-field only.
# It does NOT modify failureType (JS_UNSUPPORTED / NETWORK_POLICY_MISMATCH)
# and does NOT modify actualLevel.

