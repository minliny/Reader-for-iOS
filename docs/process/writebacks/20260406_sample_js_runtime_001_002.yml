semanticCheck:

  sample_js_runtime_001:
    sourceFile: "Core/Tests/ReaderCoreJSRendererTests/JSRuntimeTests.swift"
    contractIntent: >
      When JSRuntime is configured with a 10 ms timeout and a 30 ms
      pre-execution delay (forcing a timeout), the call to execute(html:)
      must return the original HTML string unchanged.
      Assertion: XCTAssertEqual(output, fixtureHTML)
    contractEvidence: >
      makeForTesting(timeoutMilliseconds: 10, preExecutionDelayMilliseconds: 30,
      additionalEvaluationScripts: []). The delay (30 ms) exceeds the timeout
      (10 ms), guaranteeing a timeout condition. Assertion checks
      output == fixtureHTML.
    testResultMatchesContractIntent: "yes"
    explanation: >
      Test passed in 0.062 seconds on macOS-14 arm64. The runtime correctly
      detected the timeout and returned the original HTML unchanged.
      Confirmed by raw log line 829.
    testAssertionsUnchangedSinceLastGoodRun: "first-run"
    infrastructureErrorRuledOut: true

  sample_js_runtime_002:
    sourceFile: "Core/Tests/ReaderCoreJSRendererTests/JSRuntimeUnsupportedBoundaryTests.swift"
    contractIntent: >
      When JSRuntime evaluates a script that calls document.querySelector()
      and that API is unavailable, the call to execute(html:) must return
      the original HTML string unchanged.
      Assertion: XCTAssertEqual(output, fixtureHTML)
    contractEvidence: >
      makeForTesting(timeoutMilliseconds: 1500, preExecutionDelayMilliseconds: 0,
      additionalEvaluationScripts: ["document.querySelector('article')"]).
      The script calls querySelector. The runtime traps the exception and
      returns original HTML. Assertion checks output == fixtureHTML.
    testResultMatchesContractIntent: "yes"
    explanation: >
      Test passed in 0.010 seconds on macOS-14 arm64. The runtime correctly
      trapped the querySelector exception and returned the original HTML
      unchanged. Confirmed by raw log line 836.
    testAssertionsUnchangedSinceLastGoodRun: "first-run"
    infrastructureErrorRuledOut: true

