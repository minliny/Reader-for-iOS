# ─────────────────────────────────────────────────────────────────────────────
# SEMANTIC CONSISTENCY CHECK
# Grounded in the test source. Independent of CI artifact status.
# ─────────────────────────────────────────────────────────────────────────────
semanticCheck:

  sample_js_runtime_001:
    sourceFile: "Core/Tests/ReaderCoreJSRendererTests/JSRuntimeTests.swift"
    contractIntent: >
      When JSRuntime is configured with a 10 ms timeout and a 30 ms
      pre-execution delay (forcing a timeout), the call to execute(html:)
      must return the original HTML string unchanged.
      Assertion: XCTAssertEqual(output, fixtureHTML)
    contractEvidence: >
      makeForTesting(timeoutMilliseconds: 10, preExecutionDelayMilliseconds: 30,
      additionalEvaluationScripts: []).
      The delay (30 ms) exceeds the timeout (10 ms), guaranteeing a timeout
      condition. The test then asserts output == fixtureHTML.
    testResultMatchesContractIntent: "yes — the assertion directly tests the fallback value"
    explanation: >
      The test intentionally induces a timeout and verifies the safe fallback
      path. A passing result confirms that JSRuntime does not throw, does not
      return nil, and does not return a partial or mutated string. The
      fallback is deterministic and value-preserving.
    testAssertionsUnchangedSinceLastGoodRun: "first-run"
    infrastructureErrorRuledOut: "PENDING — confirm when artifact is downloaded"

  sample_js_runtime_002:
    sourceFile: "Core/Tests/ReaderCoreJSRendererTests/JSRuntimeUnsupportedBoundaryTests.swift"
    contractIntent: >
      When JSRuntime evaluates a script that calls document.querySelector()
      and that API is unavailable in the runtime's JS environment, the call
      to execute(html:) must return the original HTML string unchanged.
      Assertion: XCTAssertEqual(output, fixtureHTML)
    contractEvidence: >
      makeForTesting(timeoutMilliseconds: 1500, preExecutionDelayMilliseconds: 0,
      additionalEvaluationScripts: ["document.querySelector('article')"]).
      The script calls querySelector, which is known to be unsupported in
      the current JSRuntime PoC. The test then asserts output == fixtureHTML.
    testResultMatchesContractIntent: "yes — the assertion directly tests the fallback value"
    explanation: >
      The test exercises an unsupported API call and verifies the safe
      fallback path. A passing result confirms that JSRuntime traps the
      error internally and returns the original HTML rather than propagating
      an exception or returning a mutated value. The fallback is
      deterministic and value-preserving.
    testAssertionsUnchangedSinceLastGoodRun: "first-run"
    infrastructureErrorRuledOut: "PENDING — confirm when artifact is downloaded"

