# ─────────────────────────────────────────────────────────────────────────────
# LAYER 3 DECISION: compat_matrix Update
# ─────────────────────────────────────────────────────────────────────────────
layer3Decision:

  updateCompatMatrix: "no"
  reason: >
    compat_matrix.yml (v0.12.0) already carries actualLevel: "A" for both
    sample_js_runtime_001 and sample_js_runtime_002, set by deliberate human
    decision in commit c4613a0. The access classification has not changed.
    No matrix write-back is required or authorized for this review.

  # Rationale recorded for auditability — not a new decision, a confirmation.
  sample_js_runtime_001:
    currentActualLevel: "A"
    proposedActualLevel: "A (no change)"
    ruleApplied: "unitContractRules.rule1_safeFallback"
    rationale: >
      The contract verifies that when JSRuntime times out, the original HTML
      is returned as a safe fallback. The runtime does not block content
      access and does not alter the HTML — it degrades gracefully back to the
      unprocessed input. Per rule1_safeFallback: 'If the unit test verifies
      that the runtime correctly identifies a boundary condition and safely
      returns a defined fallback value, the sample is actualLevel A.' The
      content access path for this fixture has no network gate, no JS
      rendering requirement at the host level, and no policy restriction.
      actualLevel A is correct and confirmed.
    prohibitedReasoningCheck: >
      This rationale does NOT state 'test passed therefore A.' It describes
      the content access semantics: the fallback path is present, the HTML
      is preserved, and the runtime stays compliant with tier-A behavior.
      CI execution status is evidence that the runtime implements the
      contract; it is not the basis for the level classification.

  sample_js_runtime_002:
    currentActualLevel: "A"
    proposedActualLevel: "A (no change)"
    ruleApplied: "unitContractRules.rule1_safeFallback"
    rationale: >
      The contract verifies that when querySelector is unavailable,
      JSRuntime returns the original HTML as a safe fallback. The absence
      of querySelector does not make content permanently inaccessible —
      the runtime degrades gracefully to the unprocessed input. Per
      rule1_safeFallback this is level A. Per rule2_partialCapability: this
      sample does NOT qualify as D because a fallback IS present (original
      HTML is returned) and the content path is not permanently blocked.
      actualLevel A is correct and confirmed.
    prohibitedReasoningCheck: >
      This rationale does NOT state 'test passed therefore A.' The
      key distinction from a hypothetical level-D case: if querySelector
      failing caused the TOC to be unextractable with NO fallback, that
      would be D. Here, the contract explicitly requires a safe fallback
      (return original HTML), so the access path is not blocked.

