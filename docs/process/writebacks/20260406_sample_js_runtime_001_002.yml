layer3Decision:
  updateCompatMatrix: "no"
  reason: >
    compat_matrix.yml (v0.12.0) already carries actualLevel "A" for both
    sample_js_runtime_001 and sample_js_runtime_002, set by deliberate
    human decision in commit c4613a0. The CI execution confirms the runtime
    implements the contract correctly. The access classification has not
    changed and does not need to change.

  sample_js_runtime_001:
    currentActualLevel: "A"
    proposedActualLevel: "A (no change)"
    ruleApplied: "unitContractRules.rule1_safeFallback"
    rationale: >
      The contract verifies a safe fallback: when execution times out, the
      original HTML is returned. The runtime does not block content access;
      it degrades gracefully. The content access path for this unit contract
      has no network gate, no JS rendering requirement at the host level,
      and no policy restriction. The CI result confirms the implementation
      is correct. actualLevel A is confirmed, not derived from test status.
    prohibitedReasoningCheck: >
      This rationale describes content access semantics, not test execution
      status. The CI result is evidence of correct implementation; it is
      not the basis for the level classification.

  sample_js_runtime_002:
    currentActualLevel: "A"
    proposedActualLevel: "A (no change)"
    ruleApplied: "unitContractRules.rule1_safeFallback"
    rationale: >
      The absence of querySelector causes a safe fallback to original HTML,
      not a permanent content access failure. Per rule2_partialCapability:
      a fallback IS present (original HTML returned), so content is not
      permanently blocked. The CI result confirms the implementation is
      correct. actualLevel A is confirmed, not derived from test status.
    prohibitedReasoningCheck: >
      This rationale describes content access semantics. The key distinction
      from a level-D case: no fallback present = D. Fallback present = A.

