reviewBasis: >
  First successful CI execution of nonjs_sample_004_search,
  nonjs_sample_004_toc, and nonjs_sample_004_content on macOS-14 GitHub
  Actions (run 24035945054). These are the first XCTest-backed regression
  tests for any non-JS parser flow in this project. Purpose: confirm that
  NonJSParserEngine correctly handles CSS class selectors (.entry, .ep) and
  CSS id selector (#story) against sample_004 fixture HTML, then update the
  three regression reports from pending to verified state.

# ─────────────────────────────────────────────────────────────────────────────
# SEMANTIC CONSISTENCY CHECK
# ─────────────────────────────────────────────────────────────────────────────
semanticCheck:

  nonjs_sample_004_search:
    sourceFile: "Core/Tests/ReaderCoreParserTests/NonJSSample004RegressionTests.swift"
    contractIntent: >
      When NonJSParserEngine applies ruleSearch "css:.entry" to
      sample_004_search.html, it must return exactly 3 SearchResultItems
      with titles [三体, 斗破苍穹, 完美世界] and detailURLs matching
      samples/expected/search/sample_004.json.
      Assertion: XCTAssertEqual(result.count, 3) + 6 field equality checks.
    contractEvidence: >
      Fixture HTML contains 3 <div class="entry"> elements, each with
      text content "title|url". NonJSParserEngine.parseSearchResponse
      applies css:.entry → extractBySimpleCSS → splits on "|" to obtain
      title/detailURL pairs. All 6 field assertions verified by log line 849.
    testResultMatchesContractIntent: "yes"
    explanation: >
      Test passed in 0.000 seconds on macOS-14 arm64. The parser correctly
      extracted 3 items with exact title and detailURL values. Confirmed by
      raw log line 849.
    testAssertionsUnchangedSinceLastGoodRun: "first-run"
    infrastructureErrorRuledOut: true

  nonjs_sample_004_toc:
    sourceFile: "Core/Tests/ReaderCoreParserTests/NonJSSample004RegressionTests.swift"
    contractIntent: >
      When NonJSParserEngine applies ruleToc "css:.ep" to
      sample_004_toc.html, it must return exactly 4 TOCItems with
      chapterTitles and chapterURLs matching
      samples/expected/toc/sample_004.json.
      Assertion: XCTAssertEqual(result.count, 4) + 8 field equality checks.
    contractEvidence: >
      Fixture HTML contains 4 <div class="ep"> elements, each with
      text content "chapterTitle|chapterURL". NonJSParserEngine.parseTOCResponse
      applies css:.ep → extractBySimpleCSS → splits on "|". All 8 field
      assertions verified by log line 851.
    testResultMatchesContractIntent: "yes"
    explanation: >
      Test passed in 0.000 seconds on macOS-14 arm64. The parser correctly
      extracted 4 chapters with exact title and URL values. Confirmed by
      raw log line 851.
    testAssertionsUnchangedSinceLastGoodRun: "first-run"
    infrastructureErrorRuledOut: true

  nonjs_sample_004_content:
    sourceFile: "Core/Tests/ReaderCoreParserTests/NonJSSample004RegressionTests.swift"
    contractIntent: >
      When NonJSParserEngine applies ruleContent "css:#story" to
      sample_004_content.html, it must return a ContentPage whose content
      field equals exactly the string in samples/expected/content/sample_004.json:
      "宇宙中有无数文明，地球只是其中微不足道的一粒尘埃。叶文洁仰望星空，心中充满了对宇宙真相的渴望与恐惧。"
      Assertions: XCTAssertFalse(page.content.isEmpty) + XCTAssertEqual(exact string).
    contractEvidence: >
      Fixture HTML contains <div id="story">content text</div>.
      NonJSParserEngine.parseContentResponse applies css:#story →
      extractBySimpleCSS id-selector → stripHTMLTags → trims whitespace.
      Both assertions verified by log line 847.
    testResultMatchesContractIntent: "yes"
    explanation: >
      Test passed in 0.000 seconds on macOS-14 arm64. The parser correctly
      extracted the exact content string byte-for-byte. Confirmed by raw
      log line 847.
    testAssertionsUnchangedSinceLastGoodRun: "first-run"
    infrastructureErrorRuledOut: true

