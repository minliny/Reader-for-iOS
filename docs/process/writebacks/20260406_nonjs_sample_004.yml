      All three flows (search / toc / content) return well-formed output
      when CSS selectors match. On selector failure the engine throws a
      typed ReaderError with a safe fallback path in the caller. The
      content access path for these unit contracts has no network gate,
      no JS rendering requirement at the host level, and no policy
      restriction. The CI result confirms the implementation is correct.
      actualLevel A is confirmed, not derived from test execution status.
    prohibitedReasoningCheck: >
      This rationale describes content access semantics, not test execution
      status. The CI result is evidence of correct implementation; it is
      not the basis for the level classification.

