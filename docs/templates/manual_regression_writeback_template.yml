# Manual Regression Write-back Record
#
# Usage:
#   1. Copy this file to docs/process/writebacks/YYYYMMDD_{sampleId}.yml
#   2. Fill in every field marked FILL_IN. Do not leave placeholders.
#   3. Attach or reference the CI run URL as evidence.
#   4. A second reviewer should read this record before any commit is merged.
#   5. Keep this file alongside the PR that performs the write-back.
#
# clean-room declaration:
#   This template and any record derived from it must not reference external
#   standards, proprietary schemas, or GPL-licensed content.
#   All evidence must come from within this repository's CI artifacts.

writebackId: "FILL_IN"          # e.g. "wb_js_runtime_20260406"
createdAt: "FILL_IN"            # ISO-8601, e.g. "2026-04-06T09:00:00Z"
reviewerHandle: "FILL_IN"       # GitHub handle or initials of the human reviewer
ciRunUrl: "FILL_IN"             # e.g. "https://github.com/owner/repo/actions/runs/12345678"
artifactName: "core-swift-test-log"

cleanRoom:
  externalReferenceUsed: false
  note: "Write-back record is derived solely from CI artifacts produced within this repository."

# ─────────────────────────────────────────────────────────────────────────────
# ASSOCIATED SAMPLES
# List every sample affected by this write-back. One entry per sample.
# ─────────────────────────────────────────────────────────────────────────────
associatedSamples:
  - sampleId: "FILL_IN"           # e.g. "sample_js_runtime_001"
    category: "FILL_IN"           # e.g. "js_runtime"
    source: "FILL_IN"             # unit_test | unit_contract | real_booksource | fixture

# ─────────────────────────────────────────────────────────────────────────────
# ARTIFACT REVIEW EVIDENCE
# Fill in what was found in the downloaded CI artifact.
# ─────────────────────────────────────────────────────────────────────────────
artifactEvidence:
  snapshotPath: "samples/reports/latest/swift_test_snapshot.json"
  snapshotGeneratedAt: "FILL_IN"
  testsFound: "FILL_IN"            # integer; must be > 0 to proceed

  testResults:
    - sampleId: "FILL_IN"
      testClass: "FILL_IN"         # e.g. "JSRuntimeTests"
      testMethod: "FILL_IN"        # e.g. "testExecuteReturnsOriginalHTMLWhenExecutionTimesOut"
      status: "FILL_IN"            # passed | failed
      durationSeconds: "FILL_IN"

  rawLogVerified: "FILL_IN"        # true | false
  rawLogNote: "FILL_IN"            # What you checked in the raw log and what you found.

# ─────────────────────────────────────────────────────────────────────────────
# REVIEW BASIS
# Why is this write-back being performed? What question was it answering?
# ─────────────────────────────────────────────────────────────────────────────
reviewBasis: "FILL_IN"
# Example:
#   "First CI execution of sample_js_runtime_001 on macOS-14 after
#    JSRuntime.swift was committed. Purpose: confirm that the timeout
#    fallback contract executes correctly and update regression report
#    from pending to a verified state."

# ─────────────────────────────────────────────────────────────────────────────
# SEMANTIC CONSISTENCY CHECK
# Did the test result match the contract intent?
# Answer each question explicitly.
# ─────────────────────────────────────────────────────────────────────────────
semanticCheck:
  contractIntent: "FILL_IN"
  # Describe what the contract requires in one sentence.
  # Example: "When JSRuntime execution times out, the original HTML must be returned unchanged."

  testResultMatchesContractIntent: "FILL_IN"   # yes | no | partial
  explanation: "FILL_IN"
  # If 'partial' or 'no', do not proceed. File a bug instead.

  testAssertionsUnchangedSinceLastGoodRun: "FILL_IN"   # yes | no | first-run
  # Check git blame on the test file. If assertions were weakened to make the
  # test pass, this write-back is invalid. Use 'first-run' if no prior run exists.

  infrastructureErrorRuledOut: "FILL_IN"   # yes | no
  # Confirm the CI run did not fail due to timeout, OOM, or checkout error.
  # If 'no', retry the run before proceeding.

# ─────────────────────────────────────────────────────────────────────────────
# LAYER 2 DECISION: Regression Report Update
# ─────────────────────────────────────────────────────────────────────────────
layer2Decision:
  updateRegressionReport: "FILL_IN"   # yes | no
  targetFile: "FILL_IN"               # e.g. "samples/reports/latest/js_runtime_timeout_regression.yml"

  # If yes, list the exact field changes. Only these fields may change.
  # All other fields must remain byte-for-byte identical to the repo source.
  authorizedChanges:
    executorVerified: "FILL_IN"      # false → true
    runNote: "FILL_IN"               # New note text referencing this CI run
    summaryPassed: "FILL_IN"         # integer
    summaryFailed: "FILL_IN"         # integer
    summarySkipped: "FILL_IN"        # integer
    sampleResultsStatus: "FILL_IN"   # pending → passed | failed

  diffVerified: "FILL_IN"
  # After applying changes: did you run 'git diff' and confirm ONLY the
  # authorized fields changed? yes | no | not-yet
  # Must be 'yes' before committing.

# ─────────────────────────────────────────────────────────────────────────────
# LAYER 3 DECISION: compat_matrix Update
# ─────────────────────────────────────────────────────────────────────────────
layer3Decision:
  updateCompatMatrix: "FILL_IN"   # yes | no
  # 'yes' is only valid if:
  #   (a) layer2 write-back is complete, AND
  #   (b) this is the first ratification of the initial actualLevel, OR
  #       the access classification has genuinely changed.

  # If yes, fill in the following:
  targetSampleId: "FILL_IN"
  currentActualLevel: "FILL_IN"    # Current value in compat_matrix (A | B | C | D)
  proposedActualLevel: "FILL_IN"   # Must be A | B | C | D

  # actualLevel determination: cite the applicable rule from
  # docs/process/ci_artifact_manual_review_workflow.yml § actualLevelRules
  ruleApplied: "FILL_IN"
  # e.g. "unitContractRules.rule1_safeFallback"

  rationale: "FILL_IN"
  # Explain in 1-3 sentences why the proposed actualLevel is correct.
  # Must reference the sample's access semantics, not the CI test status.
  # Example:
  #   "The contract verifies a safe fallback: when execution times out, the
  #    original HTML is returned. The runtime does not block content access;
  #    it degrades gracefully. Per rule1_safeFallback, the access path
  #    remains tier A, so actualLevel is A."

  prohibitedReasoning:
    - "Test passed therefore actualLevel is A."
    - "Test failed therefore actualLevel is D or F."
    - "Placeholder pending CI confirmation."
  note: >
    If your rationale sounds like any of the prohibited patterns above,
    stop and re-read the actualLevelRules in the process document before
    proceeding.

# ─────────────────────────────────────────────────────────────────────────────
# REVIEW CONCLUSION
# Final sign-off. Both fields are mandatory before any commit.
# ─────────────────────────────────────────────────────────────────────────────
reviewConclusion:
  approved: "FILL_IN"              # yes | no
  blockers: "FILL_IN"              # "none" if approved; otherwise describe what must be resolved
  prNumber: "FILL_IN"              # GitHub PR number carrying this write-back commit
  commitSha: "FILL_IN"             # SHA of the commit that performs the write-back (fill after commit)
