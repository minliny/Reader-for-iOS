uncovered_capabilities: []

ios_gate:
  allowed: false
  conditions:
    - condition: "Track D M1 complete"
      status: COMPLETE
    - condition: "Minimal M2 tooling subset complete (AdapterHarness + TraceInspector)"
      status: PENDING
    - condition: "Shell smoke validation complete"
      status: PENDING
    - condition: "Architecture review pass"
      status: PENDING
  previous_conditions_superseded: "Track D M1–M3 complete (旧条件，已校准)"

ios_shell_audit:
  actual_implementation_state: "SwiftUI views (BookSourceImportView/SearchView/TOCView/ContentView) + ReadingFlowCoordinator + DefaultSearchService/TOCService/ContentService + InMemoryBookSourceRepository all exist with real implementation code"
  tested: false
  phase_gate_approved: false
  test_coverage: "iOS/Tests/ReaderAppTests/ is empty — zero test coverage for iOS Shell"
  missing_capabilities:
    - "Disk persistence (InMemoryBookSourceRepository only)"
    - "Multi-source management (single source selection only)"
    - "Settings/preferences UI"
    - "Any automated test"
  risk_assessment: "iOS Shell code is more complete than state docs previously indicated, but remains untested and unapproved for phase gate"

recent_action:
  summary: "OT-006 (AdapterIntegrationTestHarness) implemented: MockHTTPAdapter + MockStorageAdapter + MockSchedulerAdapter + AdapterContractVerifier + AdapterAssertions. 26 test cases. Pending CI verification."
  category: tooling_implementation
  state_effect: "OT-006 code complete. M2 minimal subset now partially complete (AdapterHarness done, TraceInspector pending)."

