core_modules:
  rule_parser:
    status: stable
    responsibilities:
      - rule_string_parsing
      - selector_extractor_split
      - unknown_extractor_fail_fast
  selector_engine:
    status: stable
    capabilities:
      - selector_semantics
      - descendant_matching
      - child_chain
      - tag_class_id_matching
  css_executor:
    status: stable
    responsibilities:
      - orchestration
      - html_document_parse_entry
      - extraction_dispatch
    capabilities:
      - selector_semantics
      - text/html/href/src/alt extraction
      - unknown_extractor_fail_fast
  fixture_toc_parser:
    status: stable
    guarantees:
      - selector_miss_returns_empty
      - title_miss_returns_empty
      - url_miss_returns_empty
      - count_mismatch_returns_empty
      - singleton_rejected
  toc_item:
    status: stable
    guarantees:
      - invalid_url_kept_raw
      - relative_url_requires_explicit_base
      - title_postprocessing_stable
  http_client:
    status: stable
    guarantees:
      - invalid_url_maps_to_invalid_url

recent_refactors:
  - RuleParser_extracted
  - CSSExecutor_unknown_extractor_fail_fast
  - SelectorEngine_extracted

current_structure:
  rule_parsing:
    file: "Core/Sources/ReaderCoreParser/RuleParser.swift"
    status: decoupled
  selector_execution:
    file: "Core/Sources/ReaderCoreParser/SelectorEngine.swift"
    status: decoupled
  extraction:
    file: "Core/Sources/ReaderCoreParser/CSSExecutor.swift"
    status: coupled
  orchestration:
    file: "Core/Sources/ReaderCoreParser/CSSExecutor.swift"
    status: coupled

contracts:
  css_executor_selector_semantics:
    behavior: stable
    sample_id: css_executor_selector_semantics_contract
    coverage:
      - tag_class_id
      - child_chain
      - descendant_single_segment
      - text_extraction
      - html_extraction
      - href_src_alt_extraction
  css_executor_unknown_extractor:
    behavior: fail_fast
    failure_type: RULE_UNSUPPORTED
    sample_id: css_executor_selector_semantics_contract
    expected: "samples/expected/toc/css_executor_unknown_extractor_contract.json"
  fixture_toc_parser_contract:
    behavior: stable
    sample_ids:
      - fixture_toc_selector_miss
      - fixture_toc_title_rule_miss
      - fixture_toc_url_rule_miss
      - fixture_toc_count_mismatch
      - fixture_toc_non_selector_error
  toc_item_invalid_url_contract:
    behavior: stable
    sample_id: toc_item_invalid_url_contract
  http_client_invalid_url_contract:
    behavior: stable
    sample_id: http_client_invalid_url_contract

assets:
