  previous_conditions_superseded: "Track D M1–M3 complete (旧条件，已校准)"
  gate_result_doc: docs/ios_shell_ci_gate.yml

ios_shell_audit:
  actual_implementation_state: "SwiftUI views (ReaderFlowFeatureView/BookSourceImportView/SearchView/TOCView/ContentView) + formal ShellAssembly + ReadingFlowCoordinator + DefaultSearchService/TOCService/ContentService + InMemoryBookSourceRepository are wired into a minimal reader entry flow, and functional validation now proves import -> search -> toc -> content works on fixture-backed sources."
  tested: remote_execution_passed
  phase_gate_approved: true
  test_coverage: "Construction-only ShellAssembly smoke tests plus ReaderFlowFunctionalValidationTests are execution-verified on macOS-14-arm64 CI run 24345092018. Coverage now includes reader action reachability, two fixture-backed full-chain validations (sample_004/sample_005), and a controlled content-stage 404 path."
  missing_capabilities:
    - "Disk persistence (InMemoryBookSourceRepository only)"
    - "Multi-source management (single source selection only)"
    - "Settings/preferences UI"
    - "No UI automation beyond shell/functional smoke"
  risk_assessment: "The first functional baseline is now in place. Remaining iOS work must preserve the isolated gate semantics, avoid bypassing ShellAssembly, and harden only failure-state handling around the validated reader path before any productizing UI work."

recent_action:
  summary: "M-IOS-9 Reader UX Foundation was attempted. Run 24350744946 executed on GitHub Actions and failed at shell smoke validation after the first blocker fix d97a9fb landed; the remaining first failed step is macOS-unavailable navigationBarTitleDisplayMode(.inline) in ReaderApp views."
  category: ios_reader_ux_foundation_attempt
  state_effect: "Reader UX foundation implementation exists, executionVerified remains true, but validationResult is FAIL until the macOS-hosted shell smoke compile blocker is removed and the additive UX validation step can run."

