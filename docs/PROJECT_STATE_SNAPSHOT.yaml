  strategy: Reader-Core first
  shell_policy: iOS later
  mainline: Reader-Core compatibility kernel development
  phase: m_ios_9_reader_ux_foundation_attempted
  execution_mode: recalibrated_phase2
  active_strategy: minimal_tooling_then_ios
  clean_room: true
  allow_ios_phase: conditional
  ios_block_reason: "M-IOS-9 is currently blocked in macOS-hosted shell smoke validation because ReaderApp compile reaches navigationBarTitleDisplayMode(.inline), which is unavailable on macOS before UX validation can execute."

current_focus:
  primary_track:
    - Reader-Core
    - Phase 2: Minimal Tooling Hardening → Early iOS Gate Review
  active_milestone: m_ios_9
  milestone_status: fail
  milestone_detail: "M-IOS-9 attempted a first Reader UX foundation baseline: commit 5346743 added minimal reader status cards, content container, empty/error/loading surfaces, and state-driven UX validation, but GitHub Actions run 24350744946 failed before UX validation executed because shell smoke compilation on macOS hit navigationBarTitleDisplayMode(.inline) in ReaderApp views."
  next_best_task: "M-IOS-9: Reader UX Foundation blocker resolution"
  next_best_task_detail: "Keep the attempted UX foundation scope fixed, resolve the macOS-hosted shell smoke compile blocker first, and do not open M-IOS-10 until UX foundation validation is execution-verified."

