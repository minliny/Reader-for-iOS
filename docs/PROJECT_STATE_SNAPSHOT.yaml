  strategy: Reader-Core first
  shell_policy: iOS later
  mainline: Reader-Core compatibility kernel development
  phase: m_ios_2_boundary_gate_established
  execution_mode: recalibrated_phase2
  active_strategy: minimal_tooling_then_ios
  clean_room: true
  allow_ios_phase: conditional
  ios_block_reason: "CONDITIONAL_ALLOW — M-iOS-1 complete. M-iOS-2 boundary gate and shell CI entry are established, but macOS CI execution is still required to convert shell smoke validation from PARTIAL_PASS to PASS."

current_focus:
  primary_track:
    - Reader-Core
    - Phase 2: Minimal Tooling Hardening → Early iOS Gate Review
  active_milestone: m_ios_2
  milestone_status: partial_pass
  milestone_detail: "Boundary gate script + ios-shell-ci workflow + construction-only ShellAssembly smoke tests added. Local execution is blocked by missing swift toolchain, so macOS CI evidence is still pending."
  next_best_task: "M-iOS-3: Execute shell smoke validation on macOS CI"
  next_best_task_detail: "Run .github/workflows/ios-shell-ci.yml on macOS-14, confirm swift build/test for the iOS package, and promote docs/ios_shell_ci_gate.yml from PARTIAL_PASS to PASS if the run succeeds."

