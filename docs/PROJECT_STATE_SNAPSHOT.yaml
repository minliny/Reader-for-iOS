  - artifact 产出
  - regression 回写
  - writeback 审核
  - compat_matrix 审计吸收

uncovered_capabilities: []

ios_gate:
  allowed: conditional
  decision: CONDITIONAL_ALLOW
  review_doc: docs/IOS_PHASE_GATE_REVIEW.md
  remediation_doc: docs/ios_gate_remediation_result.yml
  conditions:
    - condition: "Track D M1 complete"
      status: COMPLETE
    - condition: "Minimal M2 tooling subset complete (AdapterHarness + TraceInspector)"
      status: COMPLETE
    - condition: "Shell smoke validation complete"
      status: PARTIAL_PASS
    - condition: "Architecture review pass"
      status: PASS
  prerequisites_for_execution:
    - "CONDITION-1: Fix dependency boundary leaks — COMPLETE (M-iOS-1)"
    - "CONDITION-2: Establish iOS Shell CI build — COMPLETE (ios-shell-ci workflow added)"
    - "CONDITION-3: Execute shell smoke validation — PARTIAL_PASS (construction-only tests added; macOS CI execution pending)"
  previous_conditions_superseded: "Track D M1–M3 complete (旧条件，已校准)"
  gate_result_doc: docs/ios_shell_ci_gate.yml

ios_shell_audit:
  actual_implementation_state: "SwiftUI views (BookSourceImportView/SearchView/TOCView/ContentView) + ReadingFlowCoordinator + DefaultSearchService/TOCService/ContentService + InMemoryBookSourceRepository all exist with real implementation code"
  tested: partial
  phase_gate_approved: false
  test_coverage: "Construction-only ShellAssembly smoke tests added at iOS/Tests/ShellSmokeTests/ShellAssemblySmokeTests.swift. macOS CI execution still pending."
  missing_capabilities:
    - "Disk persistence (InMemoryBookSourceRepository only)"
    - "Multi-source management (single source selection only)"
    - "Settings/preferences UI"
    - "Any automated test"
  risk_assessment: "iOS Shell code is more complete than state docs previously indicated, but remains untested and unapproved for phase gate"

recent_action:
  summary: "M-iOS-2 implemented to PARTIAL_PASS: added scripts/check_ios_boundary.sh, .github/workflows/ios-shell-ci.yml, and ShellAssembly construction smoke tests. Boundary rescan passed with 0 violations; local swift execution remains unavailable."
  category: ios_shell_gate
  state_effect: "Shell boundary is now codified, ShellAssembly wiring is test-addressable, and docs/ios_shell_ci_gate.yml records current gate state with next phase set to M-iOS-3."

