# Reader for iOS — Core Gap Handoff Register
# Generated: 2026-05-13T00:00+08:00
#
# Records Reader-Core public API gaps that affect iOS development.
# iOS must NOT implement these — they are handed off to Reader-Core.
#
# ios_status enum:
#   BLOCKED — iOS task cannot proceed
#   WORKAROUND_AVAILABLE — iOS can proceed with mock or alternative
#   NOT_BLOCKING — iOS can proceed without this capability
#
# core_status enum:
#   REPORTED — Gap has been reported to Reader-Core
#   ACKNOWLEDGED — Reader-Core acknowledges the gap
#   IN_PROGRESS — Reader-Core is working on it
#   RESOLVED — Reader-Core has shipped the capability
#   UNREPORTED — Not yet reported

