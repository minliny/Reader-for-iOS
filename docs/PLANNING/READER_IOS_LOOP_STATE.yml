## 循环执行规则

1. **阶段递进**: 一个阶段 100% 完成后方可进入下一阶段
2. **单次任务**: 每次循环仅执行一个任务
3. **前置检查**: 执行任务前先读取当前状态
4. **阻塞处理**: 发现阻塞立即生成 BLOCKER 报告，停止后续任务
5. **文档优先**: 所有变更必须同步更新相关文档
6. **边界约束**: 禁止在非 Shell 层 import Core internal

