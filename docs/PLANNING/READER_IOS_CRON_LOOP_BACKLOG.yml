# Reader for iOS — Cron Loop Backlog
# Generated: 2026-05-13T00:00+08:00
#
# Status enum:
#   READY, PENDING, LOCKED, BLOCKED, NEEDS_CONFIRM,
#   MOVED_TO_CORE, MOVED_TO_ADAPTER, DONE, DONE_CANDIDATE
#
# Priority: P0 (critical) > P1 (high) > P2 (medium) > P3 (low)
#
# Only ONE task should be READY at a time.
# Cron loop executes the single READY task per cycle.

tasks:

