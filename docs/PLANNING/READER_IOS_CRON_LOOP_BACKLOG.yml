  # ═══════════════════════════════════════════════════════════

  - id: IOS-CRON-000
    title: "Repository baseline audit refresh"
    stage: iOS-0
    status: DONE_CANDIDATE
    priority: P0
    implementation_scope: >
      Verify repository structure unchanged since last audit.
      Re-run boundary check, check git status, check HEAD.
      Confirm dependency resolution status.
      Refresh loop state if needed.
    core_dependency: "None (read-only)"
    app_deliverable: "Current state reflected in READER_IOS_CRON_LOOP_STATE.yml"
    allowed_files:
      - docs/PLANNING/READER_IOS_CRON_LOOP_STATE.yml
    forbidden_actions:
      - "No code changes"
      - "No dependency changes"
      - "No network access"
      - "No Core modification"
    preflight_checks:
      - "pwd is Reader for iOS repo root"
      - "git status shows only expected modifications"
      - "boundary check passes"
    blocker_detection:
      - "Unexpected dirty files in worktree"
      - "Boundary check failure"
      - "HEAD mismatch with expected"
    user_decision_detection:
      - "Uncommitted changes unrelated to loop"
    acceptance: "Loop state accurately reflects current repo state"
    validation: "Manual review of loop state vs reality"
    next_on_success: IOS-CRON-001
    stop_conditions:
      - "Unrelated dirty files → STOP, ask user"
      - "Boundary violation → STOP, fix first"
    handoff_if_blocked: "N/A (read-only audit)"

  - id: IOS-CRON-001
    title: "Build/test entrypoint confirmation"
    stage: iOS-0
    status: DONE_CANDIDATE
    priority: P0
    implementation_scope: >
      Resolve Package.swift sibling dependency path issue.
      Option A: Create symlink iOS/Reader-Core -> ../../Reader-Core.
      Option B: Change .package(path:) to absolute path.
      Option C: Document that swift test requires xcodegen project.
      Option D: Check if xcodebuild can serve as primary validation path.

      Then: verify xcodebuild status (accept Core-side failure with documentation).
      Run swift test if path resolved.
      Update loop state with current build/test status.
    core_dependency: "Reader-Core at /Users/minliny/Documents/Reader-Core must be accessible"
    app_deliverable: "Documented build/test entrypoint with clear status"
    allowed_files:
      - docs/PLANNING/READER_IOS_CRON_LOOP_STATE.yml
      - docs/PLANNING/READER_IOS_CORE_GAP_HANDOFF_REGISTER.yml
    forbidden_actions:
      - "Do NOT modify Reader-Core source"
      - "Do NOT change Package.swift dependency products"
      - "Do NOT add new dependencies"
      - "Do NOT modify Swift source"
      - "Do NOT auto-commit"
    preflight_checks:
      - "Reader-Core repo exists at /Users/minliny/Documents/Reader-Core"
      - "Boundary check passes"
      - "No unresolved user decisions blocking config changes"
    blocker_detection:
      - "Reader-Core not found at expected path"
      - "Package.swift modification requires user approval"
      - "Symlink creation requires user approval"
    user_decision_detection:
      - "Should we create symlink or modify Package.swift?"
      - "Is xcodebuild sufficient as primary validation?"
    acceptance: "Clear build/test path documented; Core-side failure attributed correctly"
    validation: "bash scripts/check_ios_boundary.sh && (swift test || xcodebuild build -scheme ReaderForIOSApp -destination '...')"
    next_on_success: IOS-CRON-003
    stop_conditions:
      - "Reader-Core compile error blocks build → document as Core gap"
      - "User decision needed on approach → STOP, ask user"
    handoff_if_blocked: "If Core compile error: add to CORE_GAP_HANDOFF_REGISTER, mark as MOVED_TO_CORE"

